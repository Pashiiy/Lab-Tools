name: CI

# Non-release validation only. Runs on branch pushes / PRs.
# This workflow MUST NOT package installers, sign apps, upload DMGs,
# or create GitHub Releases — that is exclusively release.yml's job.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      # Pin npm to the exact version declared in package.json "packageManager"
      # (the version that generated package-lock.json). Node 22.13 ships npm 10.x,
      # whose resolver disagrees with the npm 11 lockfile and causes the
      # @emnapi/* "missing from lock file" npm ci failures.
      - name: Pin npm to packageManager version
        shell: bash
        run: |
          NPM_VERSION="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          npm i -g "npm@${NPM_VERSION}"
          npm -v

      - name: Install dependencies (npm ci — strict, lockfile-pinned)
        run: npm ci
        env:
          HUSKY: '0'

      - name: Validate lockfile is in sync
        run: npm run validate:lock

      # Non-blocking for now: the codebase has pre-existing lint errors.
      # Remove `continue-on-error` to make lint a hard gate once they're fixed.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build renderer (no packaging)
        run: npm run build
