name: Release Lab Tools

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_command: npx electron-builder --mac --publish always
          - os: windows-latest
            platform: win
            build_command: npx electron-builder --win --publish always

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate platform icons
        run: npm run generate-icons

      - name: Build renderer (Vite)
        run: npm run build

      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.build_command }}

      - name: Upload macOS DMG artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: lab-tools-mac-${{ github.ref_name }}
          path: release/mac/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows installer artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: lab-tools-win-${{ github.ref_name }}
          path: release/win/*.exe
          if-no-files-found: error
          retention-days: 30
