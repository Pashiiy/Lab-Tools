name: Release Lab Tools

# Tag-driven only: npm run release → standard-version → git push --follow-tags → this workflow.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install dependencies
        run: npm ci

      - name: Generate platform icons
        run: npm run generate-icons

      - name: Build renderer (Vite)
        run: npm run build

      - name: Package macOS DMG (ad-hoc signed, no notarization)
        env:
          # Prevent partial signing from stray CI keychain identities.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac dmg --publish never

      - name: Verify app signature before release
        run: npm run verify:mac

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    name: Windows NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install dependencies
        run: npm ci

      - name: Generate platform icons
        run: npm run generate-icons

      - name: Build renderer (Vite)
        run: npm run build

      - name: Package Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish never

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: GitHub Release
    needs:
      - build-mac
      - build-win
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish release (DMG + installer only)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lab Tools ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-artifacts/mac-dmg/*.dmg
            dist-artifacts/win-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
