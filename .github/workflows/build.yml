name: Release Lab Tools

# Tag-driven only: npm run release → standard-version → git push --follow-tags → this workflow.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-mac:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: CI environment diagnostics
        run: |
          node -v
          npm -v
          ls -la package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate platform icons
        run: npm run generate-icons

      - name: Build renderer (Vite)
        run: npm run build

      - name: Prepare clean release output directory
        run: |
          rm -rf release
          mkdir -p release

      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-tools-mac-${{ github.ref_name }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  release-win:
    name: Windows NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: CI environment diagnostics
        shell: bash
        run: |
          node -v
          npm -v
          ls -la package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate platform icons
        run: npm run generate-icons

      - name: Build renderer (Vite)
        run: npm run build

      - name: Prepare clean release output directory
        shell: cmd
        run: |
          if exist release rmdir /s /q release
          mkdir release

      - name: Package and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-tools-win-${{ github.ref_name }}
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
