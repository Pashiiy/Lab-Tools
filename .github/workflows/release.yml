name: Release

# SINGLE SOURCE OF TRUTH for releases.
# Triggered ONLY by version tags pushed via `npm run release` (scripts/release.mjs).
# This is the ONLY workflow allowed to build installers and create GitHub Releases.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      # Pin npm to the exact version declared in package.json "packageManager"
      # (the version that generated package-lock.json). Node 22.13 ships npm 10.x,
      # whose resolver disagrees with the npm 11 lockfile and causes the
      # @emnapi/* "missing from lock file" npm ci failures.
      - name: Pin npm to packageManager version
        shell: bash
        run: |
          NPM_VERSION="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          npm i -g "npm@${NPM_VERSION}"
          npm -v

      - name: Install dependencies (npm ci — strict, lockfile-pinned)
        run: npm ci
        env:
          HUSKY: '0'

      - name: Validate lockfile is in sync
        run: npm run validate:lock

      - name: Build renderer (Vite)
        run: npm run build

      - name: Package macOS DMG (ad-hoc signed, no notarization)
        env:
          # Prevent partial signing from stray CI keychain identities.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac

      - name: Verify app signature (fails the release on a broken bundle)
        run: npm run verify:mac

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 30

  build-win:
    name: Windows NSIS
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      # Pin npm to the exact version declared in package.json "packageManager"
      # (the version that generated package-lock.json). Node 22.13 ships npm 10.x,
      # whose resolver disagrees with the npm 11 lockfile and causes the
      # @emnapi/* "missing from lock file" npm ci failures.
      - name: Pin npm to packageManager version
        shell: bash
        run: |
          NPM_VERSION="$(node -p "require('./package.json').packageManager.split('@')[1]")"
          npm i -g "npm@${NPM_VERSION}"
          npm -v

      - name: Install dependencies (npm ci — strict, lockfile-pinned)
        run: npm ci
        env:
          HUSKY: '0'

      - name: Validate lockfile is in sync
        run: npm run validate:lock

      - name: Build renderer (Vite)
        run: npm run build

      - name: Package Windows installer
        run: npm run dist:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs:
      - build-mac
      - build-win
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish release (installers only — no raw .app / source zips)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lab Tools ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist-artifacts/mac-dmg/*.dmg
            dist-artifacts/win-installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
