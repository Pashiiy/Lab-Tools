<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none" role="img" aria-label="Lab Tools">
  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A3D5C"/>
      <stop offset="1" stop-color="#13294B"/>
    </linearGradient>
  </defs>
  <!-- Dark background (navy) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Petri dish / lens outer ring -->
  <circle cx="256" cy="256" r="198" stroke="#4B9CD3" stroke-width="10" opacity="0.95"/>
  <circle cx="256" cy="256" r="168" stroke="#4B9CD3" stroke-width="3" opacity="0.35"/>
  <!-- Subtle lab grid -->
  <g stroke="#FFFFFF" stroke-width="2" opacity="0.12">
    <line x1="196" y1="216" x2="316" y2="216"/>
    <line x1="196" y1="256" x2="316" y2="256"/>
    <line x1="196" y1="296" x2="316" y2="296"/>
    <line x1="236" y1="196" x2="236" y2="316"/>
    <line x1="276" y1="196" x2="276" y2="316"/>
  </g>
  <!-- LT monogram -->
  <g fill="#FFFFFF">
    <!-- L -->
    <rect x="168" y="178" width="36" height="156" rx="4"/>
    <rect x="168" y="298" width="92" height="36" rx="4"/>
    <!-- T -->
    <rect x="276" y="178" width="120" height="36" rx="4"/>
    <rect x="318" y="178" width="36" height="156" rx="4"/>
  </g>
  <!-- Carolina blue accent dot (microscope focal point) -->
  <circle cx="256" cy="256" r="10" fill="#4B9CD3"/>
</svg>
